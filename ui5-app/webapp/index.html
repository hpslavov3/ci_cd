<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAP Multi-Stack Demo</title>
  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/1.120.1/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m,sap.ui.core,sap.ui.layout,sap.ui.table"
    data-sap-ui-resourceroots='{"ui5app": "./"}'
    data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
    data-sap-ui-compatversion="edge"
    data-sap-ui-async="true"
  ></script>
</head>
<body class="sapUiBody" id="content">
  <div
    data-sap-ui-component
    data-name="ui5app"
    data-id="container"
    data-settings='{"id":"ui5app"}'
  ></div>
</body>
</html>
